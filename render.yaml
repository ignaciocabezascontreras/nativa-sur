services:
  - type: web
    name: nativa-sur-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon
    envVars:
      - key: FLOW_API_KEY
        sync: false
      - key: FLOW_SECRET_KEY
        sync: false
      - key: FLOW_URL
        value: https://www.flow.cl/api
      - key: FRONTEND_URL
        value: https://nasur.cl
      - key: PUBLIC_URL
        value: https://nasur.cl
      - key: ADMIN_EMAIL
        value: ignaciocabezascontreras@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Ignacio Cabezas
      - key: CORS_ORIGINS
        value: https://nasur.cl,https://www.nasur.cl,http://localhost:3000
